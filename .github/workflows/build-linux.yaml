on:
  push:
    tags:
      - 'v*'

name: cargo-linux

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p ewe-cli
      - run: cp target/release/ewe-cli ewe-cli-linux
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ewe-cli-linux
          prerelease: false
          generate_release_notes: true
